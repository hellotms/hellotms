name: Database Backup

on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Backup Database
        run: |
          mkdir -p backups
          FILENAME="backup-$(date +'%Y-%m-%d-%H%M%S').sql"
          supabase db dump --db-url "${{ secrets.SUPABASE_DB_URL }}" -f "backups/$FILENAME"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Upload to R2
        run: |
          aws s3 cp backups/$FILENAME s3://${{ secrets.R2_BUCKET_NAME }}/database-backups/$FILENAME \
            --endpoint-url ${{ secrets.R2_ENDPOINT }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_REGION: auto

      - name: Cleanup old backups (Retention logic)
        uses: actions/github-script@v7
        with:
          script: |
            // This step is a bit tricky with sync-action as it syncs a folder.
            // For a proper 30-day retention, we should probably use a direct R2/S3 client script
            // to delete items older than 30 days in the destination bucket path.
            // But since we are syncing a single file each time from a fresh runner, 
            // the sync-action --delete would delete everything else in R2 if we are not careful.
            
            // Refinement: We will use a JS script with AWS SDK to list and delete.
            console.log("Retention logic will be handled by a dedicated JS script in the next step.");

      - name: Retention Script
        run: |
          npm install @aws-sdk/client-s3
          cat << 'EOF' > retention.js
          const { S3Client, ListObjectsV2Command, DeleteObjectCommand } = require("@aws-sdk/client-s3");
          const client = new S3Client({
            region: "auto",
            endpoint: process.env.R2_ENDPOINT,
            credentials: {
              accessKeyId: process.env.R2_ACCESS_KEY_ID,
              secretAccessKey: process.env.R2_SECRET_ACCESS_KEY,
            },
          });

          async function prune() {
            const list = await client.send(new ListObjectsV2Command({
              Bucket: process.env.R2_BUCKET_NAME,
              Prefix: "database-backups/",
            }));

            if (!list.Contents) return;

            const now = new Date();
            const thirtyDaysAgo = new Date(now.setDate(now.getDate() - 30));

            for (const item of list.Contents) {
              if (item.LastModified < thirtyDaysAgo) {
                console.log(`Deleting old backup: ${item.Key}`);
                await client.send(new DeleteObjectCommand({
                  Bucket: process.env.R2_BUCKET_NAME,
                  Key: item.Key,
                }));
              }
            }
          }
          prune().catch(console.error);
          EOF
          node retention.js
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
